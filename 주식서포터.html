    border: 1px solid #22262E; border-radius: 14px; padding: 13px 14px; cursor: pointer; gap: 10px;
  }
  .stock-row:hover { border-color: #2A2F38; }
  .rsi-badge {
    display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 3px 10px;
    font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .rsi-dot { width: 6px; height: 6px; border-radius: 50%; }
  .navbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
    background: #15181D; border-top: 1px solid #22262E; display: flex;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; padding: 8px 0; cursor: pointer; color: #5B6270;
  }
  .nav-btn.active { color: #5DCAA5; }
  .nav-btn .emoji { font-size: 18px; }
  .nav-btn .label { font-size: 10.5px; }
  .nav-btn.active .label { font-weight: 600; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: flex-end;
    justify-content: center; z-index: 50;
  }
  .modal-sheet {
    background: #15181D; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto;
    border-radius: 20px 20px 0 0; padding: 20px 20px 32px; border: 1px solid #262B33;
  }
  .close-btn { background: none; border: none; color: #8B93A1; cursor: pointer; font-size: 22px; padding: 4px; }
  .info-box {
    display: flex; gap: 8px; align-items: flex-start; background: #1B1F26; border-radius: 10px;
    padding: 10px 12px; font-size: 11.5px; color: #8B93A1; line-height: 1.5;
  }
  .upload-drop {
    border: 1.5px dashed #2A2F38; border-radius: 14px; padding: 28px 16px; text-align: center;
    cursor: pointer; margin-bottom: 14px;
  }
  .apply-btn {
    width: 100%; padding: 13px 0; border-radius: 12px; border: none; font-size: 14.5px; font-weight: 600;
  }

  .apply-btn.disabled { background: #22262E; color: #5B6270; cursor: not-allowed; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }

  #ptr-indicator {

function matchesSearch(s, q) {
  if (!q) return true;
  if (s.name.toLowerCase().indexOf(q) !== -1) return true;
  if (s.ticker.toLowerCase().indexOf(q) !== -1) return true;
  var aliases = KOREAN_ALIASES[s.ticker] || KOREAN_ALIASES[s.name];
  if (aliases) {
    for (var i = 0; i < aliases.length; i++) {
      if (aliases[i].toLowerCase().indexOf(q) !== -1) return true;
    }
  }
  return false;
}

var FIREBASE_PROJECT_ID = "stock-supporter-5f99e";
var FIREBASE_API_KEY = "AIzaSyD7KGEvtqFIhSauLO-G2xzPcuG1v-VZtFo";
var FIRESTORE_BASE = "https://firestore.googleapis.com/v1/projects/" + FIREBASE_PROJECT_ID + "/databases/default/documents";

function firestoreGet(collection, id) {
  return fetch(FIRESTORE_BASE + "/" + collection + "/" + id + "?key=" + FIREBASE_API_KEY)
    .then(function (res) {
      if (res.status === 404) return null;
      if (!res.ok) throw new Error("firestore get failed: " + res.status);
      return res.json();
    })
    .then(function (doc) {
      if (!doc || !doc.fields || !doc.fields.json) return null;
      try { return JSON.parse(doc.fields.json.stringValue); } catch (e) { return null; }
    })
    .catch(function (e) { return null; });
}

function firestoreSet(collection, id, data) {
  var body = {
    fields: {
      json: { stringValue: JSON.stringify(data) },
      updatedAt: { integerValue: String(Date.now()) }
    }
  };
  return fetch(FIRESTORE_BASE + "/" + collection + "/" + id + "?key=" + FIREBASE_API_KEY, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).catch(function (e) { /* 네트워크 오류 시 무시 (로컬 저장은 이미 완료된 상태) */ });
}

// ID별 비밀번호(선택사항). 비밀번호 원문은 저장하지 않고 SHA-256 해시만 저장한다.
function sha256Hex(text) {
  var enc = new TextEncoder().encode(text);
  return crypto.subtle.digest("SHA-256", enc).then(function (buf) {
    return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join("");
  });
}

// 하루 한 번, 현재 포트폴리오의 평가금액/평가손익 스냅샷을 저장해서
// 나중에 자산 변화 추이(전일/전년 대비 등)를 볼 수 있게 한다. 같은 날짜의
// 기록은 최신 값으로 덮어써서 하루 1건만 남긴다.
function recordPortfolioSnapshot() {
  var rate = (typeof EXCHANGE_RATE !== "undefined") ? EXCHANGE_RATE.usdKrw : 1450;
  var rows = buildPortfolioRows();
  if (rows.length === 0) return;
  var totalKRW = rows.reduce(function (sum, r) { return sum + valueInKRW(r, rate); }, 0);
  var totalCostKRW = rows.reduce(function (sum, r) { return sum + (r.stock.market === "KR" ? r.cost : r.cost * rate); }, 0);
  var today = new Date().toISOString().slice(0, 10);
  var history = loadPortfolioHistory(state.portfolioId);
  var todayEntry = { date: today, totalKRW: totalKRW, totalCostKRW: totalCostKRW, profitKRW: totalKRW - totalCostKRW };
  var idx = history.findIndex(function (h) { return h.date === today; });
  if (idx !== -1) history[idx] = todayEntry;
  else history.push(todayEntry);
  savePortfolioHistory(state.portfolioId, history);
  cloudSaveHistory(state.portfolioId, history);
}

/* 유틸                                                                */
/* ------------------------------------------------------------------ */
function esc(str) {
  return String(str).replace(/[&<>"']/g, function (c) {
    return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
  });
}

function enrich(s) {
  var hasValuation = !!(s.fairPrice && s.targetPrice);
  var gapToFair = hasValuation ? ((s.price - s.fairPrice) / s.fairPrice) * 100 : null;
  var gapToTarget = hasValuation ? ((s.price - s.targetPrice) / s.targetPrice) * 100 : null;
  return Object.assign({}, s, { gapToFair: gapToFair, gapToTarget: gapToTarget, hasValuation: hasValuation });
}

function fmtUsdNum(v) {
  return v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPrice(s) {
  var isKR = s.market === "KR";
  var symbol = isKR ? "" : "$";
  var suffix = isKR ? "원" : "";
  var val = isKR ? Math.round(s.price).toLocaleString() : fmtUsdNum(s.price);
  return symbol + val + suffix;
}

function fmtPct(v) {
  var sign = v > 0 ? "+" : "";
  return sign + v.toFixed(1) + "%";
}

function changePctHtml(s, fontSize) {
  if (s.changePct === null || s.changePct === undefined) return "";
  var color = s.changePct >= 0 ? "#E24B4A" : "#4C8DFF";
  return '<span style="font-size:' + fontSize + 'px;font-weight:600;color:' + color + '">' + fmtPct(s.changePct) + '</span>';
}

function fgZone(score) {
  if (score >= 80) return { key: "extreme_greed", label: "익스트림 그리드", sub: "적극 열매수확 리밸런싱", emoji: "\u{1F525}", color: "#E24B4A" };
  if (score >= 60) return { key: "greed", label: "그리드", sub: "열매수확", emoji: "\u2600\uFE0F", color: "#EF9F27" };
  if (score >= 40) return { key: "neutral", label: "뉴트럴", sub: "중립", emoji: "\u{1F343}", color: "#888780" };
  if (score >= 20) return { key: "fear", label: "피어", sub: "사냥시즌", emoji: "\u{1F327}\uFE0F", color: "#1D9E75" };
  return { key: "extreme_fear", label: "익스트림 피어", sub: "공격적 사냥", emoji: "\u2744\uFE0F", color: "#378ADD" };
}

function rsiBadgeHtml(rsi) {
  var isHigh = rsi >= 70, isLow = rsi < 30;
  var label = isHigh ? "과매수" : isLow ? "과매도" : "노말";
  var color = isHigh ? "#E24B4A" : isLow ? "#1D9E75" : "#8B93A1";
  var bg = isHigh ? "rgba(226,75,74,0.12)" : isLow ? "rgba(29,158,117,0.12)" : "#15181D";
  var border = isHigh ? "#E24B4A" : isLow ? "#1D9E75" : "#22262E";
  var dotColor = isHigh ? "#E24B4A" : isLow ? "#1D9E75" : "#9CA3AF";
  return '<span class="rsi-badge" style="background:' + bg + ';color:' + color + ';border:1px solid ' + border + '">' +
    '<span class="rsi-dot" style="background:' + dotColor + '"></span>RSI ' + rsi + ' · ' + label + '</span>';
}

/* 1페이지: 초보자 추천 (QQQ DCA)                                        */
/* ------------------------------------------------------------------ */
function runBacktest(amountK, years, cagr, vol) {
  var amt = amountK * 1000;
  var days = years * 252;
  var dailyReturn = Math.pow(1 + cagr, 1 / 252) - 1;
  var seed = 42;
  function rand() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
  var shares = 0, invested = 0, price = 100;
  var points = [];
  for (var d = 0; d < days; d++) {
    var shock = (rand() - 0.5) * 2 * vol;
    price *= (1 + dailyReturn + shock);
    shares += amt / price;
    invested += amt;
    if (d % 21 === 0) points.push({ month: Math.round(d / 21), invested: Math.round(invested), value: Math.round(shares * price) });
  }
  var finalValue = Math.round(shares * price);
  return { points: points, invested: Math.round(invested), finalValue: finalValue, profit: finalValue - Math.round(invested) };
}

function lineChartSvg(points, valueColor) {
  var w = 100, h = 100;
  var color = valueColor || "#5DCAA5";
  var maxV = Math.max.apply(null, points.map(function (p) { return p.value; }).concat(points.map(function (p) { return p.invested; })));
  var minV = 0;
  function x(i) { return (i / (points.length - 1)) * w; }
  function y(v) { return h - ((v - minV) / (maxV - minV)) * h; }
  var investedPath = points.map(function (p, i) { return (i === 0 ? "M" : "L") + x(i).toFixed(2) + "," + y(p.invested).toFixed(2); }).join(" ");
  var valuePath = points.map(function (p, i) { return (i === 0 ? "M" : "L") + x(i).toFixed(2) + "," + y(p.value).toFixed(2); }).join(" ");
  return (
    '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="width:100%;height:220px;display:block">' +
      '<line x1="0" y1="' + h + '" x2="' + w + '" y2="' + h + '" stroke="#22262E" stroke-width="0.5"/>' +
      '<path d="' + investedPath + '" fill="none" stroke="#5B6270" stroke-width="1" vector-effect="non-scaling-stroke"/>' +
      '<path d="' + valuePath + '" fill="none" stroke="' + color + '" stroke-width="1.5" vector-effect="non-scaling-stroke"/>' +
    '</svg>'
  );
}

function themePageHtml() {
  var q = state.searchQuery.trim().toLowerCase();
  var filtered = state.stocks.filter(function (s) {
    var themeMatch = q !== "" || state.themeFilter === "전체" || s.theme === state.themeFilter;
    var queryMatch = matchesSearch(s, q);
    return themeMatch && queryMatch;
  });

  var grouped = {};
  var order = [];
  if (q === "" && state.themeFilter !== "전체") {
    grouped[state.themeFilter] = filtered;
    order = [state.themeFilter];
  } else {
    filtered.forEach(function (s) {
      if (!grouped[s.theme]) { grouped[s.theme] = []; order.push(s.theme); }
      grouped[s.theme].push(s);
    });
  }

  var chipsHtml = THEMES.map(function (t) {
    var active = state.themeFilter === t ? " active" : "";
    return '<button class="theme-chip' + active + '" data-action="set-theme" data-theme="' + esc(t) + '">' + esc(t) + '</button>';
  }).join("");

  var bodyHtml = "";
  if (order.length === 0) {
    bodyHtml = '<div style="text-align:center;color:#5B6270;font-size:13px;padding:40px 0">검색 결과가 없습니다.</div>';
  } else {
    bodyHtml = order.map(function (themeName) {
      var list = grouped[themeName];
      var heading = (q !== "" || state.themeFilter === "전체")
        ? '<div style="font-size:13px;font-weight:500;color:#5DCAA5;margin-bottom:8px;padding-left:2px">' + esc(themeName) + ' · ' + list.length + '종목</div>'
        : "";
      var rows = list.map(function (s) { return stockRowHtml(s, "theme"); }).join('<div style="height:8px"></div>');
      return '<div style="margin-bottom:18px">' + heading + '<div style="display:flex;flex-direction:column;gap:8px">' + rows + '</div></div>';
    }).join("");
  }

  return (
    '<div class="page">' +
      '<div class="page-title">테마별 종목</div>' +
      '<div style="position:relative;margin-bottom:12px">' +
        '<input type="text" id="search-input" placeholder="종목명 또는 코드 검색" value="' + esc(state.searchQuery) + '" style="padding-right:36px">' +
        (state.searchQuery
          ? '<button data-action="clear-search" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#22262E;border:none;border-radius:50%;width:22px;height:22px;color:#8B93A1;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">&times;</button>'
          : "") +

function selectPortfolioTicker(ticker) {
  var stock = state.stocks.filter(function (s) { return s.ticker === ticker; })[0];
  if (!stock) return;
  state.portfolioSelectedTicker = ticker;
  state.portfolioSearchQuery = stock.name;
  state.portfolioSuggestionsOpen = false;
  state.portfolioHighlightIndex = -1;
  render();
}

function addPortfolioHolding() {
  var qtyInput = document.getElementById("portfolio-qty-input");
  var priceInput = document.getElementById("portfolio-price-input");
  var ticker = state.portfolioSelectedTicker;
  var qty = parseFloat(qtyInput ? qtyInput.value : "");
  var avgPrice = parseFloat(priceInput ? priceInput.value : "");
  var stock = state.stocks.filter(function (s) { return s.ticker === ticker; })[0];

  if (!stock || !qty || qty <= 0 || !avgPrice || avgPrice <= 0) {
    state.portfolioError = "목록에서 종목을 검색해 선택하고, 수량·매입단가를 입력해주세요.";
    render();
    return;
  }

  var existing = state.portfolio.filter(function (h) { return h.ticker === ticker; })[0];
  if (existing) {
    var totalQty = existing.qty + qty;
    existing.avgPrice = (existing.qty * existing.avgPrice + qty * avgPrice) / totalQty;
    existing.qty = totalQty;
  } else {
    state.portfolio.push({ ticker: ticker, qty: qty, avgPrice: avgPrice });
  }
  savePortfolio(state.portfolio);
  state.portfolioError = "";
  state.portfolioSearchQuery = "";
  state.portfolioSelectedTicker = "";
  render();
}

function removePortfolioHolding(ticker) {
  state.portfolio = state.portfolio.filter(function (h) { return h.ticker !== ticker; });

}

function openAddToPortfolio(ticker) {

function saveAddToPortfolio() {

function confirmPortfolioId() {
  var input = document.getElementById("portfolio-id-input");
  var pwInput = document.getElementById("portfolio-id-password-input");
  var id = input ? input.value.trim() : "";
  var pw = pwInput ? pwInput.value.trim() : "";
  if (!/^\d{4}$/.test(id)) {
    state.portfolioIdError = "ID는 숫자 4자리로 입력해주세요.";
    render();
    return;
  }
  state.portfolioIdError = "";
  state.portfolioSyncing = true;
  render();

  var targetHasPassword = false;
  cloudLoadPasswordHash(id).then(function (hash) {
    if (!hash) return true;
    targetHasPassword = true;
    if (!pw) {
      state.portfolioIdError = "이 ID는 비밀번호가 설정되어 있습니다. 비밀번호를 입력해주세요.";
      return false;
    }
    return sha256Hex(pw).then(function (pwHash) {
      if (pwHash !== hash) {
        state.portfolioIdError = "비밀번호가 틀렸습니다.";
        return false;
      }
      return true;
    });
  }).then(function (ok) {
    if (!ok) {
      state.portfolioSyncing = false;
      render();
      return;
    }
    state.hasPassword = targetHasPassword;
    proceedWithPortfolioIdSwitch(id);
  }).catch(function (e) {
    // 네트워크 오류 시에도 비밀번호 확인 없이는 진행하지 않는다
    state.portfolioSyncing = false;
    state.portfolioIdError = "비밀번호 확인 중 오류가 발생했습니다. 다시 시도해주세요.";
    render();
  });
}

function proceedWithPortfolioIdSwitch(id) {
  state.portfolioId = id;
  savePortfolioId(id);
  state.portfolio = loadPortfolio(id);
  state.favorites = loadFavorites(id);
  state.showPortfolioIdForm = false;
  state.portfolioIdError = "";
  render();

  cloudLoadPortfolio(id).then(function (cloudData) {
    if (cloudData) {
      // 클라우드에 이미 저장된 데이터가 있으면 그것을 최신으로 보고 반영
      state.portfolio = cloudData;
      try { localStorage.setItem(portfolioStorageKey(id), JSON.stringify(cloudData)); } catch (e) {}
    } else {
      // 클라우드에 없으면 지금 가진 로컬 데이터를 클라우드에 올린다
      cloudSavePortfolio(id, state.portfolio);
    }
    return cloudLoadHistory(id);
  }).then(function (cloudHistory) {
    if (cloudHistory) {
      savePortfolioHistory(id, cloudHistory);
    } else {
      cloudSaveHistory(id, loadPortfolioHistory(id));
    }
    return cloudLoadFavorites(id);
  }).then(function (cloudFavorites) {
    if (cloudFavorites) {
      state.favorites = cloudFavorites;
      try { localStorage.setItem(favoritesStorageKey(id), JSON.stringify(cloudFavorites)); } catch (e) {}
    } else {
      cloudSaveFavorites(id, state.favorites);
    }
  }).catch(function (e) { /* 무시: 로컬 데이터로 계속 사용 */ }).then(function () {
    state.portfolioSyncing = false;
    render();
  });
}

function savePasswordForm() {
  var v1Input = document.getElementById("password-new-input");
  var v2Input = document.getElementById("password-confirm-input");
  var v1 = v1Input ? v1Input.value : "";
  var v2 = v2Input ? v2Input.value : "";
  if (v1 === "" && v2 === "") {
    cloudDeletePasswordHash(state.portfolioId).then(function () {
      state.hasPassword = false;
      state.showPasswordForm = false;
      state.passwordFormError = "";
      render();
    });
    return;
  }
  if (v1 !== v2) {
    state.passwordFormError = "두 값이 일치하지 않습니다.";
    render();
    return;
  }
  sha256Hex(v1).then(function (hash) {
    cloudSavePasswordHash(state.portfolioId, hash);
    state.hasPassword = true;
    state.showPasswordForm = false;
    state.passwordFormError = "";
    render();
  });
}

// 현재 ID의 포트폴리오/자산추이/즐겨찾기를 로컬+클라우드에서 완전히 삭제하고 빈 상태로 되돌린다.
// (다른 ID로 실수로 전환했다가 데이터가 복제된 경우, 그 ID를 완전히 비우는 용도)
function resetCurrentPortfolio() {
  var id = state.portfolioId;
  if (!id) return;
  var ok = window.confirm("포트폴리오 ID " + id + "의 데이터(포트폴리오·자산추이·즐겨찾기)를 완전히 삭제하고 빈 상태로 되돌립니다. 계속할까요?");
  if (!ok) return;
  try {
    localStorage.removeItem(portfolioStorageKey(id));
    localStorage.removeItem(historyStorageKey(id));
    localStorage.removeItem(favoritesStorageKey(id));
  } catch (e) {}
  state.portfolio = [];
  state.favorites = {};
  firestoreDelete("portfolios", id);
  firestoreDelete("history", id);
  firestoreDelete("favorites", id);
  render();
}

function fmtMoney(v, isKR) {
  return isKR ? Math.round(v).toLocaleString() + "원" : "$" + fmtUsdNum(v);
}

function portfolioGroupHtml(rows, label, isKR) {
  if (rows.length === 0) return "";
  var totalValue = rows.reduce(function (sum, r) { return sum + r.marketValue; }, 0);
  var totalCost = rows.reduce(function (sum, r) { return sum + r.cost; }, 0);
  var totalProfit = totalValue - totalCost;
  var totalProfitPct = totalCost > 0 ? (totalProfit / totalCost) * 100 : 0;

  var sortedRows = rows.slice().sort(function (a, b) {
    return state.portfolioSortBy === "alpha"
      ? a.stock.name.localeCompare(b.stock.name)
      : b.marketValue - a.marketValue;
  });

  var rowsHtml = sortedRows.map(function (r) {
    var allocPct = totalValue > 0 ? (r.marketValue / totalValue) * 100 : 0;
    var profitColor = r.profit >= 0 ? "#E24B4A" : "#4C8DFF";
    var profitAmountDisp = isKR
      ? (r.profit >= 0 ? "+" : "") + Math.round(r.profit).toLocaleString() + '원'
      : (r.profit >= 0 ? "+$" : "-$") + fmtUsdNum(Math.abs(r.profit));
    var es = enrich(r.stock);
    var valuationHtml = (!r.isCash && es.hasValuation)
      ? '<div style="font-size:11px;color:#5B6270;margin-top:2px">적정가 ' + fmtMoney(es.fairPrice, isKR) + ' · 목표가 ' + fmtMoney(es.targetPrice, isKR) + '</div>'
      : "";
    var clickAttrs = r.isCash ? "" : ' data-action="open-detail" data-ticker="' + esc(r.h.ticker) + '"';
    return (
      '<div style="background:#15181D;border:1px solid #22262E;border-radius:12px;padding:12px 14px;margin-bottom:8px;' + (r.isCash ? "" : "cursor:pointer;") + '"' + clickAttrs + '>' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">' +
          '<div>' +
            '<div style="font-size:14px;font-weight:600;color:#F5F6F8">' + esc(r.stock.name) + '</div>' +
            '<div style="font-size:11px;color:#8B93A1;margin-top:2px">' + (r.isCash ? "보유 현금" : r.h.qty + '주 · 평단 ' + fmtMoney(r.h.avgPrice, isKR)) + '</div>' +
            valuationHtml +
          '</div>' +
          '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0">' +
            '<button data-action="edit-portfolio" data-ticker="' + esc(r.h.ticker) + '" style="background:none;border:1px solid #2A2F38;border-radius:6px;color:#8B93A1;font-size:11px;cursor:pointer;padding:3px 7px">수정</button>' +
            '<button data-action="remove-portfolio" data-ticker="' + esc(r.h.ticker) + '" style="background:none;border:none;color:#5B6270;font-size:16px;cursor:pointer;padding:2px;line-height:1">&times;</button>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline">' +
          '<div style="font-size:13.5px;font-weight:600;color:#F5F6F8">' + fmtMoney(r.marketValue, isKR) + '</div>' +
          '<div style="font-size:12px;color:' + profitColor + '">' + profitAmountDisp + ' (' + fmtPct(r.profitPct) + ')</div>' +
        '</div>' +
        '<div style="margin-top:7px;height:5px;background:#22262E;border-radius:3px;overflow:hidden">' +
          '<div style="width:' + allocPct.toFixed(1) + '%;height:100%;background:#4C8DFF"></div>' +
        '</div>' +
        '<div style="font-size:11px;color:#5B6270;margin-top:3px">비중 ' + allocPct.toFixed(1) + '%</div>' +
      '</div>'
    );
  }).join("");

  return (
    '<div style="margin-bottom:20px">' +
      '<div style="font-size:13px;font-weight:500;color:#8B93A1;margin-bottom:8px">' + label + ' · 평가금액 ' + fmtMoney(totalValue, isKR) + '</div>' +
      '<div style="display:flex;gap:10px;margin-bottom:10px">' +
        '<div style="flex:1;background:#1B1F26;border-radius:10px;padding:10px">' +
          '<div style="font-size:11px;color:#8B93A1">매입금액</div>' +
          '<div style="font-size:14px;font-weight:600;color:#F5F6F8;margin-top:2px">' + fmtMoney(totalCost, isKR) + '</div>' +
        '</div>' +
        '<div style="flex:1;background:#1B1F26;border-radius:10px;padding:10px">' +
          '<div style="font-size:11px;color:#8B93A1">평가손익</div>' +
          '<div style="font-size:14px;font-weight:600;color:' + (totalProfit >= 0 ? "#E24B4A" : "#4C8DFF") + ';margin-top:2px">' + fmtMoney(totalProfit, isKR) + ' (' + fmtPct(totalProfitPct) + ')</div>' +
        '</div>' +

      rowsHtml +
    '</div>'
  );

function getStockOrCash(ticker) {
  if (ticker === "CASH_KRW") return { ticker: "CASH_KRW", name: "현금(원화)", market: "KR", theme: "현금", price: 1 };
  if (ticker === "CASH_USD") return { ticker: "CASH_USD", name: "현금(달러)", market: "US", theme: "현금", price: 1 };
  return state.stocks.filter(function (s) { return s.ticker === ticker; })[0];
}

function buildPortfolioRows() {
  return state.portfolio.map(function (h) {
    var isCash = h.ticker === "CASH_KRW" || h.ticker === "CASH_USD";
    var stock = getStockOrCash(h.ticker);
    if (!stock) return null;
    var currentPrice = stock.price;
    var marketValue = h.qty * currentPrice;
    var cost = isCash ? marketValue : h.qty * h.avgPrice;
    var profit = marketValue - cost;
    var profitPct = cost > 0 ? (profit / cost) * 100 : 0;
    return { h: h, stock: stock, marketValue: marketValue, cost: cost, profit: profit, profitPct: profitPct, isCash: isCash };
  }).filter(function (r) { return r !== null; });
}

function valueInKRW(r, rate) {
  return r.stock.market === "KR" ? r.marketValue : r.marketValue * rate;
}

var PORTFOLIO_GROUPS = [
  { key: "KR", label: "\uD83C\uDDF0\uD83C\uDDF7 국내", isKR: true },
  { key: "US", label: "\uD83C\uDDFA\uD83C\uDDF8 해외", isKR: false },
  { key: "CRYPTO", label: "\uD83E\uDE99 가상자산", isKR: false },
  { key: "CASH_KRW", label: "\uD83D\uDCB5 현금(원화)", isKR: true },
  { key: "CASH_USD", label: "\uD83D\uDCB5 현금(달러)", isKR: false }
];

function rowGroupKey(r) {
  if (r.h.ticker === "CASH_KRW") return "CASH_KRW";
  if (r.h.ticker === "CASH_USD") return "CASH_USD";
  if (r.stock.theme === "가상자산") return "CRYPTO";
  return r.stock.market;
}

function portfolioHistoryHtml() {
  var history = loadPortfolioHistory(state.portfolioId).slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; });
  if (history.length === 0) {
    return '<div style="font-size:12px;color:#5B6270;padding:4px 2px 10px">아직 기록된 데이터가 없습니다. 오늘부터 자동으로 기록됩니다.</div>';
  }
  var first = history[0];
  var latest = history[history.length - 1];
  var overallPct = first.totalKRW > 0 ? ((latest.totalKRW - first.totalKRW) / first.totalKRW) * 100 : 0;
  var overallColor = (latest.totalKRW - first.totalKRW) >= 0 ? "#E24B4A" : "#4C8DFF";

  var rowsHtml = history.map(function (h, i) {
    var prev = i > 0 ? history[i - 1] : null;
    var changePct = prev && prev.totalKRW > 0 ? ((h.totalKRW - prev.totalKRW) / prev.totalKRW) * 100 : null;
    var changeColor = changePct !== null && changePct >= 0 ? "#E24B4A" : "#4C8DFF";
    return (
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #22262E">' +
        '<div style="font-size:12px;color:#8B93A1">' + h.date + '</div>' +

    '</div>'
  );

var ALLOC_COLORS = ["#4C8DFF", "#5DCAA5", "#F0997B", "#A78BFA", "#E2C94B", "#4BC0E2", "#E2607A", "#8FD14F", "#C77DFF", "#FF8FA3", "#6FCF97", "#F2C94C"];

function portfolioAllocationChartHtml(rows, rate) {
  if (!rows.length) return "";
  var items = rows.map(function (r) {
    return { name: r.stock.name, valueKRW: valueInKRW(r, rate) };
  }).sort(function (a, b) { return b.valueKRW - a.valueKRW; });
  var total = items.reduce(function (s, i) { return s + i.valueKRW; }, 0);
  if (total <= 0) return "";

  var r = 52, cx = 60, cy = 60, circumference = 2 * Math.PI * r;
  var offset = 0;
  var segs = items.map(function (item, i) {
    var pct = item.valueKRW / total;
    var dash = pct * circumference;
    var seg =
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + ALLOC_COLORS[i % ALLOC_COLORS.length] + '" stroke-width="20" ' +
      'stroke-dasharray="' + dash.toFixed(2) + ' ' + (circumference - dash).toFixed(2) + '" stroke-dashoffset="' + (-offset).toFixed(2) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')" />';
    offset += dash;
    return seg;
  }).join("");

  var legend = items.map(function (item, i) {
    var pct = (item.valueKRW / total) * 100;
    return (
      '<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#C6CBD3;margin-bottom:5px">' +
        '<span style="width:9px;height:9px;border-radius:50%;background:' + ALLOC_COLORS[i % ALLOC_COLORS.length] + ';display:inline-block;flex-shrink:0"></span>' +
        '<span style="flex:1">' + esc(item.name) + '</span>' +
        '<span style="color:#8B93A1;font-weight:600">' + pct.toFixed(1) + '%</span>' +
      '</div>'
    );
  }).join("");

  return (
    '<div class="card" style="padding:16px;margin-bottom:16px">' +
      '<div style="font-size:13px;font-weight:500;color:#F5F6F8;margin-bottom:12px">보유 종목 비중 (원화 환산)</div>' +
      '<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">' +
        '<svg viewBox="0 0 120 120" style="width:120px;height:120px;flex-shrink:0">' + segs + '</svg>' +
        '<div style="flex:1;min-width:140px">' + legend + '</div>' +
      '</div>' +
    '</div>'
  );
}

function computeSectorExposure(rows, rate) {
  var map = {};
  rows.forEach(function (r) {
    var theme = r.stock.theme || "기타";
    map[theme] = (map[theme] || 0) + valueInKRW(r, rate);
  });
  return Object.keys(map).map(function (k) { return { label: k, valueKRW: map[k] }; })
    .sort(function (a, b) { return b.valueKRW - a.valueKRW; });
}

function findExposureMergeGroup(ticker) {
  for (var i = 0; i < EXPOSURE_MERGE_GROUPS.length; i++) {
    var g = EXPOSURE_MERGE_GROUPS[i];
    for (var j = 0; j < g.members.length; j++) {
      if (g.members[j].ticker === ticker) return { group: g, beta: g.members[j].beta };
    }
  }
  return null;
}

function computeStockExposure(rows, rate) {
  var map = {};
  rows.forEach(function (r) {
    var valueKRW = valueInKRW(r, rate);
    var merge = findExposureMergeGroup(r.h.ticker);
    if (merge) {
      var key = merge.group.symbol;
      if (!map[key]) map[key] = { label: merge.group.label, valueKRW: 0 };
      map[key].valueKRW += valueKRW * merge.beta;
      return;
    }
    var holdings = (typeof ETF_HOLDINGS !== "undefined") ? ETF_HOLDINGS[r.h.ticker] : null;
    if (holdings && holdings.length > 0) {
      holdings.forEach(function (h) {
        if (!map[h.symbol]) map[h.symbol] = { label: h.name, valueKRW: 0 };
        map[h.symbol].valueKRW += valueKRW * h.weight;
      });
    } else {
      if (!map[r.h.ticker]) map[r.h.ticker] = { label: r.stock.name, valueKRW: 0 };
      map[r.h.ticker].valueKRW += valueKRW;
    }
  });
  return Object.keys(map).map(function (k) { return { label: map[k].label, symbol: k, valueKRW: map[k].valueKRW }; })
    .sort(function (a, b) { return b.valueKRW - a.valueKRW; });
}

function bigBarListHtml(items, total) {
  if (!items.length) return '<div style="font-size:12px;color:#5B6270">데이터가 없습니다.</div>';
  return items.map(function (item) {
    var pct = total > 0 ? (item.valueKRW / total) * 100 : 0;
    return (
      '<div style="margin-bottom:16px">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;gap:8px">' +
          '<span style="font-size:15px;font-weight:600;color:#F5F6F8">' + esc(item.label) +
            (item.symbol && item.symbol !== item.label ? ' <span style="font-size:11px;color:#5B6270;font-weight:400">' + esc(item.symbol) + '</span>' : "") +
          '</span>' +
          '<span style="font-size:15px;font-weight:700;color:#4C8DFF;white-space:nowrap">' + pct.toFixed(1) + '%</span>' +
        '</div>' +
        '<div style="height:12px;background:#22262E;border-radius:6px;overflow:hidden">' +
          '<div style="width:' + Math.min(pct, 100).toFixed(1) + '%;height:100%;background:linear-gradient(90deg,#4C8DFF,#5DCAA5)"></div>' +
        '</div>' +
      '</div>'
    );
  }).join("");
}

function portfolioDetailModalHtml() {
  var rows = buildPortfolioRows();
  var rate = (typeof EXCHANGE_RATE !== "undefined") ? EXCHANGE_RATE.usdKrw : 1450;
  var totalKRW = rows.reduce(function (s, r) { return s + valueInKRW(r, rate); }, 0);
  var sectorExposure = computeSectorExposure(rows, rate);
  var stockExposure = computeStockExposure(rows, rate).slice(0, 10);

  return (
    '<div class="modal-backdrop" data-action="close-portfolio-detail">' +

function fmtLevelPrice(v, isKR) {
  return isKR ? Math.round(v).toLocaleString() + "원" : "$" + fmtUsdNum(v);
}

function miniChartSvg(hist, support, resistance, isKR, channel) {
  if (!hist || hist.length < 2) return "";
  var w = 600, h = 200, padL = 4, padR = 4, padT = 16, padB = 16;
  var allVals = hist.concat(support || []).concat(resistance || []);
  if (channel) allVals = allVals.concat(channel.upper || []).concat(channel.lower || []);
  var min = Math.min.apply(null, allVals);
  var max = Math.max.apply(null, allVals);
  if (min === max) { min -= 1; max += 1; }
  var innerW = w - padL - padR, innerH = h - padT - padB;
  function x(i) { return padL + (i / (hist.length - 1)) * innerW; }
  function y(v) { return padT + innerH - ((v - min) / (max - min)) * innerH; }

  var points = hist.map(function (v, i) { return x(i).toFixed(1) + "," + y(v).toFixed(1); }).join(" ");
  var lastX = x(hist.length - 1), lastY = y(hist[hist.length - 1]);

  var lines = "";
  if (channel && channel.upper && channel.lower) {
    lines += '<line x1="' + x(0).toFixed(1) + '" y1="' + y(channel.upper[0]).toFixed(1) + '" x2="' + x(hist.length - 1).toFixed(1) + '" y2="' + y(channel.upper[1]).toFixed(1) + '" stroke="#A78BFA" stroke-width="1.3" stroke-dasharray="2,2" opacity="0.8" />' +
      '<line x1="' + x(0).toFixed(1) + '" y1="' + y(channel.lower[0]).toFixed(1) + '" x2="' + x(hist.length - 1).toFixed(1) + '" y2="' + y(channel.lower[1]).toFixed(1) + '" stroke="#A78BFA" stroke-width="1.3" stroke-dasharray="2,2" opacity="0.8" />';
  }
  (resistance || []).forEach(function (lv) {
    var ly = y(lv);
    lines += '<line x1="' + padL + '" y1="' + ly.toFixed(1) + '" x2="' + (w - padR) + '" y2="' + ly.toFixed(1) + '" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4,3" />' +
      '<text x="' + (padL + 4) + '" y="' + (ly - 4).toFixed(1) + '" font-size="11" fill="#E24B4A">저항 ' + fmtLevelPrice(lv, isKR) + '</text>';
  });
  (support || []).forEach(function (lv) {
    var ly = y(lv);
    lines += '<line x1="' + padL + '" y1="' + ly.toFixed(1) + '" x2="' + (w - padR) + '" y2="' + ly.toFixed(1) + '" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4,3" />' +
      '<text x="' + (padL + 4) + '" y="' + (ly - 4).toFixed(1) + '" font-size="11" fill="#1D9E75">지지 ' + fmtLevelPrice(lv, isKR) + '</text>';
  });

  return (
    '<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:180px;display:block;overflow:visible" preserveAspectRatio="none">' +
      lines +
      '<polyline points="' + points + '" fill="none" stroke="#4C8DFF" stroke-width="2" vector-effect="non-scaling-stroke" />' +
      '<circle cx="' + lastX.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="4" fill="#4C8DFF" />' +
    '</svg>'
  );
}

  var chartSvg = miniChartSvg(tech.hist, tech.support, tech.resistance, isKR, tech.channel);

      (levelRows ? '<div style="margin-top:10px;border-top:1px solid #22262E;padding-top:8px">' + levelRows + '</div>' : "") +
      '<div style="font-size:11px;color:#6B7280;margin-top:8px;line-height:1.5">지지선/저항선/채널은 최근 6개월 가격 흐름을 바탕으로 자동 산출한 참고 지표이며, 미래 가격을 보장하지 않습니다.</div>' +

function parseCSVLikeSheet(text) {
  // 간단한 CSV 파서 (쉼표 구분, 큰따옴표 처리)
  var rows = [];
  var lines = text.split(/\r\n|\n|\r/);
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim() === "") continue;
    var row = [];
    var cur = "";
    var inQuotes = false;
    var line = lines[i];
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (inQuotes) {
        if (ch === '"' && line[j + 1] === '"') { cur += '"'; j++; }
        else if (ch === '"') { inQuotes = false; }
        else { cur += ch; }
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ",") { row.push(cur); cur = ""; }
        else cur += ch;
      }
    }
    row.push(cur);
    rows.push(row);
  }
  return rows;
}

        '</div>' +
        '<input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none">' +
        errorHtml + parsedHtml +
        '<button class="' + btnClass + '" data-action="apply-upload" ' + (state.uploadStatus !== "parsed" ? "disabled" : "") + '>반영하기</button>' +
      '</div>' +
    '</div>'
  );
}

];

function render() {
  var fgScore = FEAR_GREED_DATA.value;

  var gaugeSectionHtml = state.page === 0 ? '<div style="padding:10px 16px 0">' + gaugeHtml(fgScore) + '</div>' : "";

  // 테마 칩 가로 스크롤 위치 유지 (재렌더링 시 초기화되지 않도록)
  if (state.page === 1) {
    var chipsEl = document.getElementById("theme-chips");
    if (chipsEl) {
      chipsEl.scrollLeft = state.themeChipsScrollLeft || 0;
      chipsEl.addEventListener("scroll", function () {
        state.themeChipsScrollLeft = chipsEl.scrollLeft;
      });
    }
  }

  // 검색창 포커스 유지
  if (state.page === 1) {
    var searchInput = document.getElementById("search-input");
    if (searchInput) {
      var composing = false;
      function commitSearch(e) {
        state.searchQuery = e.target.value;
        var focusPos = e.target.selectionStart;
        render();
        var newInput = document.getElementById("search-input");
        if (newInput) { newInput.focus(); newInput.setSelectionRange(focusPos, focusPos); }
      }
      searchInput.addEventListener("compositionstart", function () { composing = true; });
      // compositionend 뒤에는 반드시 input 이벤트가 한 번 더 오므로, 여기서 별도로
      // commitSearch를 호출하면 같은 글자에 대해 렌더링이 두 번 일어나 다음 글자의
      // 초성이 씹히는 문제가 생긴다. composing 플래그만 내리고 커밋은 input에 맡긴다.
      searchInput.addEventListener("compositionend", function () { composing = false; });
      searchInput.addEventListener("input", function (e) {
        state.searchQuery = e.target.value;
        // 한글 등 조합 입력 중에는 DOM을 재생성하지 않아야 조합이 끊기지 않음
        if (composing) return;
        commitSearch(e);
      });
    }
  }

  // 포트폴리오 종목 검색창 포커스 유지 + 자체 드롭다운(직접 위치 계산) 처리
  if (state.page === 4) {
    var portfolioInput = document.getElementById("portfolio-ticker-input");
    if (portfolioInput) {
      var pComposing = false;
      function commitPortfolioSearch(e) {
        state.portfolioSearchQuery = e.target.value;
        state.portfolioSelectedTicker = "";
        state.portfolioSuggestionsOpen = true;
        state.portfolioHighlightIndex = -1;
        var focusPos = e.target.selectionStart;
        render();
        var newInput = document.getElementById("portfolio-ticker-input");
        if (newInput) { newInput.focus(); newInput.setSelectionRange(focusPos, focusPos); }
      }
      portfolioInput.addEventListener("compositionstart", function () { pComposing = true; });
      portfolioInput.addEventListener("compositionend", function () { pComposing = false; });
      portfolioInput.addEventListener("input", function (e) {
        state.portfolioSearchQuery = e.target.value;
        state.portfolioSelectedTicker = "";
        if (pComposing) return;
        commitPortfolioSearch(e);
      });
      portfolioInput.addEventListener("keydown", function (e) {
        var query = state.portfolioSearchQuery.trim().toLowerCase();
        var suggestions = query
          ? state.stocks.filter(function (s) {
              return matchesSearch(s, query);
            }).slice(0, 8)
          : [];
        if (!state.portfolioSuggestionsOpen || suggestions.length === 0) return;
        if (e.key === "ArrowDown") {
          e.preventDefault();
          state.portfolioHighlightIndex = (state.portfolioHighlightIndex + 1) % suggestions.length;
          render();
          var i1 = document.getElementById("portfolio-ticker-input");
          if (i1) { i1.focus(); var v = i1.value; i1.setSelectionRange(v.length, v.length); }
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          state.portfolioHighlightIndex = (state.portfolioHighlightIndex - 1 + suggestions.length) % suggestions.length;
          render();
          var i2 = document.getElementById("portfolio-ticker-input");
          if (i2) { i2.focus(); var v2 = i2.value; i2.setSelectionRange(v2.length, v2.length); }
        } else if (e.key === "Enter") {
          e.preventDefault();
          var pick = suggestions[state.portfolioHighlightIndex >= 0 ? state.portfolioHighlightIndex : 0];
          if (pick) selectPortfolioTicker(pick.ticker);
        } else if (e.key === "Escape") {
          state.portfolioSuggestionsOpen = false;
          state.portfolioHighlightIndex = -1;
          render();
        }
      });
    }
  }

  var fileInput = document.getElementById("file-input");
  if (fileInput) {
    fileInput.addEventListener("change", handleFileSelect);
  }
}

/* 이벤트 처리                                                          */
/* ------------------------------------------------------------------ */
var TICKER_HEADER_ALIASES = ["티커/종목코드", "티커"];

function processSheetRows(rows) {
  // 헤더 행 찾기 (티커 계열 컬럼명이 포함된 행)
  var headerIdx = -1;
  for (var i = 0; i < rows.length; i++) {
    for (var a = 0; a < TICKER_HEADER_ALIASES.length; a++) {
      if (rows[i].indexOf(TICKER_HEADER_ALIASES[a]) !== -1) { headerIdx = i; break; }
    }
    if (headerIdx !== -1) break;
  }
  if (headerIdx === -1) {
    state.uploadStatus = "error";
    state.uploadError = "헤더 행(티커/종목코드, 종목명, 시장, 테마, 적정주가, 목표주가)을 찾지 못했습니다.";
    return;
  }
  var headers = rows[headerIdx];
  function colIdx(names) {
    for (var n = 0; n < names.length; n++) {
      var idx = headers.indexOf(names[n]);
      if (idx !== -1) return idx;
    }
    return -1;
  }
  var idxTicker = colIdx(TICKER_HEADER_ALIASES);
  var idxName = colIdx(["종목명", "이름", "Name"]);
  var idxMarket = colIdx(["시장(KR/US)", "시장"]);
  var idxTheme = colIdx(["테마"]);
  var idxFair = colIdx(["적정주가"]);
  var idxTarget = colIdx(["목표주가"]);
  var idxNote = colIdx(["비고"]);
  var idxActive = colIdx(["활성화(Y/N)", "활성화"]);

  function cell(row, idx) {
    if (idx === -1 || row[idx] === undefined || row[idx] === null) return "";
    return String(row[idx]);
  }

  // 종목명 컬럼이 없는 파일(예: 티커/목표주가/적정주가만 있는 갱신용 파일)도 지원한다.
  // 종목명이 비어 있으면 applyUpload()에서 기존 종목명으로 채운다.
  var parsed = [];
  for (var r = headerIdx + 1; r < rows.length; r++) {
    var row = rows[r];
    var ticker = cell(row, idxTicker).trim();
    if (!ticker) continue;
    var name = cell(row, idxName).trim();
    var active = idxActive !== -1 ? (cell(row, idxActive) || "Y").trim().toUpperCase() !== "N" : true;
    if (!active) continue;
    parsed.push({
      ticker: ticker,
      name: name,
      market: cell(row, idxMarket).trim().toUpperCase(),
      theme: cell(row, idxTheme).trim(),
      fairPrice: parseFloat(cell(row, idxFair)) || 0,
      targetPrice: parseFloat(cell(row, idxTarget)) || 0,
      note: cell(row, idxNote).trim()
    });
  }

  if (parsed.length === 0) {
    state.uploadStatus = "error";
    state.uploadError = "유효한 종목 데이터를 찾지 못했습니다. 형식을 확인해주세요.";
  } else {
    state.uploadParsed = parsed;
    state.uploadStatus = "parsed";
  }
}

function handleFileSelect(e) {
  var file = e.target.files[0];
  if (!file) return;
  state.uploadFileName = file.name;
  state.uploadStatus = "idle";

  var isCSV = /\.csv$/i.test(file.name);
  var isXLSX = /\.xlsx?$/i.test(file.name);

  if (isXLSX) {
    if (typeof XLSX === "undefined") {
      state.uploadStatus = "error";
      state.uploadError = "엑셀 파일을 읽는 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인한 뒤 다시 시도하거나, CSV로 저장해 업로드해주세요.";
      render();
      return;
    }
    var xReader = new FileReader();
    xReader.onload = function (ev) {
      try {
        var data = new Uint8Array(ev.target.result);
        var workbook = XLSX.read(data, { type: "array" });
        var sheet = workbook.Sheets[workbook.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" });
        processSheetRows(rows);
      } catch (err) {
        state.uploadStatus = "error";
        state.uploadError = "엑셀 파일을 읽는 중 오류가 발생했습니다: " + err.message;
      }
      render();
    };
    xReader.readAsArrayBuffer(file);
    return;
  }

  if (!isCSV) {
    state.uploadStatus = "error";
    state.uploadError = "csv 또는 xlsx 파일만 지원합니다.";
    render();
    return;
  }

  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var text = ev.target.result;
      var rows = parseCSVLikeSheet(text);
      processSheetRows(rows);
    } catch (err) {
      state.uploadStatus = "error";
      state.uploadError = "파일을 읽는 중 오류가 발생했습니다: " + err.message;
    }
    render();
  };
  reader.readAsText(file, "UTF-8");
}

function applyUpload() {
  if (!state.uploadParsed) return;
  var prevMap = {};
  state.stocks.forEach(function (s) { prevMap[s.ticker] = s; });
  state.uploadParsed.forEach(function (p) {
    var existing = prevMap[p.ticker];
    if (!existing) return; // 기존에 없는 티커는 새로 추가하지 않고 무시
    existing.name = p.name || existing.name;
    existing.market = (p.market === "US" || p.market === "KR") ? p.market : existing.market;
    existing.theme = p.theme || existing.theme;
    existing.fairPrice = p.fairPrice || existing.fairPrice;
    existing.targetPrice = p.targetPrice || existing.targetPrice;
    existing.note = p.note || existing.note;
  });
  state.showUpload = false;
  state.uploadStatus = "idle";
  state.uploadParsed = null;
  state.uploadFileName = "";
  render();
}

/* 실시간 데이터 동기화 (앱을 켜둔 상태에서 자동 갱신)                          */
/* GitHub Actions가 5분마다 SEED_STOCKS 등을 갱신·배포하므로,                  */
/* 화면이 보이는 동안 주기적으로 최신 HTML을 받아와 값만 교체하고 다시 렌더링한다.   */
/* ------------------------------------------------------------------ */
function syncLiveData() {
  return fetch(location.pathname + "?_=" + Date.now(), { cache: "no-store" })
    .then(function (res) { return res.text(); })
    .then(function (text) {
      var changed = false;
      var mSeed = text.match(/var SEED_STOCKS = (\[.*\]);/);
      var mFg = text.match(/var FEAR_GREED_DATA = (\{.*?\});/);
      var mHr = text.match(/var HISTORICAL_RETURNS = (\{.*?\});/);
      var mTd = text.match(/var TECHNICAL_DATA = (\{.*?\});/);
      var mEr = text.match(/var EXCHANGE_RATE = (\{.*?\});/);
      var mEh = text.match(/var ETF_HOLDINGS = (\{.*?\});/);
      try {
        if (mSeed) {
          var seed = JSON.parse(mSeed[1]);
          if (JSON.stringify(seed) !== JSON.stringify(SEED_STOCKS)) { SEED_STOCKS = seed; changed = true; }
        }
        if (mFg) {
          var fg = JSON.parse(mFg[1]);
          if (JSON.stringify(fg) !== JSON.stringify(FEAR_GREED_DATA)) { FEAR_GREED_DATA = fg; changed = true; }
        }
        if (mHr) {
          var hr = JSON.parse(mHr[1]);
          if (JSON.stringify(hr) !== JSON.stringify(HISTORICAL_RETURNS)) { HISTORICAL_RETURNS = hr; changed = true; }
        }
        if (mTd) {
          var td = JSON.parse(mTd[1]);
          if (JSON.stringify(td) !== JSON.stringify(TECHNICAL_DATA)) { TECHNICAL_DATA = td; changed = true; }
        }
        if (mEr) {
          var er = JSON.parse(mEr[1]);
          if (JSON.stringify(er) !== JSON.stringify(EXCHANGE_RATE)) { EXCHANGE_RATE = er; changed = true; }
        }
        if (mEh) {
          var eh = JSON.parse(mEh[1]);
          if (JSON.stringify(eh) !== JSON.stringify(ETF_HOLDINGS)) { ETF_HOLDINGS = eh; changed = true; }
        }
      } catch (e) {
        return;
      }
      if (changed) render();
    })
    .catch(function () {});
}

var LIVE_SYNC_INTERVAL_MS = 60000;
setInterval(function () {
  if (document.visibilityState === "visible") syncLiveData();
}, LIVE_SYNC_INTERVAL_MS);
document.addEventListener("visibilitychange", function () {
  if (document.visibilityState === "visible") syncLiveData();
});
window.addEventListener("online", syncLiveData);

/* ------------------------------------------------------------------ */
/* 당겨서 새로고침 (pull-to-refresh)                                       */
/* ------------------------------------------------------------------ */
(function () {
  var ptr = document.getElementById("ptr-indicator");
  var spinner = document.getElementById("ptr-spinner");
  if (!ptr || !spinner) return;
  var startY = null, currentPull = 0, tracking = false, refreshing = false;
  var THRESHOLD = 64, MAX_PULL = 96;

  function atTop() {
    return (document.scrollingElement || document.documentElement).scrollTop <= 0;
  }
  function setPull(px, animate) {
    ptr.style.transition = animate ? "transform 0.2s ease-out, opacity 0.2s ease-out" : "none";
    ptr.style.transform = "translate(-50%, " + (px - 40) + "px)";
    ptr.style.opacity = String(Math.min(px / THRESHOLD, 1));
  }

  document.addEventListener("touchstart", function (e) {
    if (refreshing) return;
    tracking = atTop();
    startY = e.touches[0].clientY;
    currentPull = 0;
  }, { passive: true });

  document.addEventListener("touchmove", function (e) {
    if (!tracking || refreshing) return;
    var dy = e.touches[0].clientY - startY;
    if (dy <= 0 || !atTop()) { tracking = false; setPull(0, true); return; }
    e.preventDefault();
    currentPull = Math.min(dy * 0.5, MAX_PULL);
    setPull(currentPull, false);
    spinner.style.transform = "rotate(" + (currentPull * 4) + "deg)";
  }, { passive: false });

  document.addEventListener("touchend", function () {
    if (!tracking) return;
    tracking = false;
    if (currentPull >= THRESHOLD && !refreshing) {
      refreshing = true;
      setPull(THRESHOLD, true);
      spinner.classList.add("ptr-spin");
      syncLiveData().finally(function () {
        refreshing = false;
        spinner.classList.remove("ptr-spin");
        setPull(0, true);
      });
    } else {
      setPull(0, true);
    }
  });
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function (e) {
      console.warn("서비스워커 등록 실패:", e);
    });
  });
}
</script>
